services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDISINSIGHT_PORT:-8001}:8001"
    volumes:
      - ./data:/data
    environment:
      REDIS_ARGS: --requirepass ${REDIS_PASSWORD:-yourpassword} --appendonly yes
    restart: unless-stopped
